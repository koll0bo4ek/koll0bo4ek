<script>

(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const W = 200, H = 112;
  canvas.width = W; canvas.height = H;

  function resize(){
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  window.addEventListener('DOMContentLoaded', () => {
  if (!audio.src || audio.src === window.location.href) return;

  
  let playPromise = audio.play();

  if (playPromise !== undefined) {
    playPromise.then(_ => {
      
      document.getElementById('play-icon').style.display = 'none';
      document.getElementById('pause-icon').style.display = 'block';
    })
    .catch(error => {
      
      console.log("Автоплей заблокирован браузером. Требуется клик пользователя.");
      
    });
  }
});


  const buf = document.createElement('canvas');
  buf.width = W; buf.height = H;
  const bx = buf.getContext('2d');

  function px(x,y,col,a=1){
    if(x<0||x>=W||y<0||y>=H) return;
    bx.globalAlpha = a;
    bx.fillStyle = col;
    bx.fillRect(x,y,1,1);
  }

  
  const skyColors = ['#080600','#0e0b00','#181200','#221900','#2e2100'];
  for(let y=0;y<H;y++){
    const ci = Math.min(skyColors.length-1, Math.floor(y/H * skyColors.length));
    for(let x=0;x<W;x++) px(x,y,skyColors[ci]);
  }

  
  const SX=132, SY=20;
  bx.globalAlpha=1;
  for(let r=36;r>0;r--){
    bx.globalAlpha = (36-r)/36 * 0.22;
    bx.fillStyle = '#f0c000';
    bx.beginPath(); bx.arc(SX,SY,r,0,Math.PI*2); bx.fill();
  }
  bx.globalAlpha=1;
  bx.fillStyle='#fff8c0'; bx.fillRect(SX,SY,2,2);

 
  const rays=[
    {a:-0.55,l:80,w:2},{a:-0.35,l:65,w:1},{a:-0.15,l:85,w:3},
    {a:0.05, l:75,w:2},{a:0.25, l:68,w:1},{a:0.45, l:78,w:2},
    {a:0.65, l:60,w:1},{a:-0.75,l:55,w:1},{a:0.85, l:62,w:2},
  ];
  rays.forEach(({a,l,w})=>{
    for(let d=5;d<l;d++){
      const rx=Math.round(SX+Math.cos(a)*d);
      const ry=Math.round(SY+Math.sin(a)*d);
      const fade = (1-d/l)*0.55;
      const col = d<l*.3?'#504000':d<l*.6?'#382c00':'#201800';
      for(let i=0;i<w;i++) px(rx+i,ry,col,fade);
    }
  });
  bx.globalAlpha=1;

  function tree(tx, h, tw, sp, bright){
    const base=H;
    for(let y=base-h;y<base;y++)
      for(let i=0;i<tw;i++) px(tx-Math.floor(tw/2)+i, y,'#100c00');
    const L=Math.ceil(h/5);
    for(let l=0;l<L;l++){
      const ly=base-h+Math.floor(l*h/L*.82);
      const s=Math.floor(sp*(1-l/L*.45));
      for(let dy=0;dy<6;dy++){
        for(let dx=-s;dx<=s;dx++){
          if(Math.abs(dx)+dy*.6>s+1) continue;
          const t=l/L;
          let col;
          if(!bright) col=t<.35?'#060400':t<.55?'#100c00':t<.72?'#1a1400':t<.85?'#282000':'#382c00';
          else        col=t<.3?'#1a1400':t<.5?'#282000':t<.65?'#3a2c00':t<.78?'#504000':t<.88?'#685200':t<.94?'#c89600':'#e0aa00';
          px(tx+dx,ly+dy,col);
        }
      }
    }
  }

 
  for(let i=0;i<30;i++){
    const tx=Math.floor(i*(W/30)+Math.sin(i*1.7)*4);
    tree(tx, 15+Math.floor(Math.abs(Math.sin(i*2.3))*12), 1, 3+Math.floor(Math.abs(Math.cos(i*1.5))*3), false);
  }

  
  tree(12, 58,2,11,false); tree(40, 70,3,14,true);
  tree(70, 54,2,10,false); tree(98, 62,2,12,true);
  tree(126,68,3,13,false); tree(156,60,2,11,true);
  tree(184,52,2,10,false);

  
  for(let y=0;y<H;y++){
    const lw=Math.floor(9+Math.sin(y*.28)*4);
    for(let x=0;x<lw;x++) px(x,y,'#040300',.92);
    const rw=Math.floor(9+Math.cos(y*.25)*4);
    for(let x=W-rw;x<W;x++) px(x,y,'#040300',.92);
  }

  
  for(let y=H-10;y<H;y++)
    for(let x=0;x<W;x++) px(x,y,'#060400');

  bx.globalAlpha=1;
  const staticImg = bx.getImageData(0,0,W,H);

  
  const GOLDS=['#b08000','#c89600','#e0aa00','#f0c000','#ffd840','#ffe860'];
  const ff=Array.from({length:55},()=>({
    x:30+Math.random()*140, y:18+Math.random()*68,
    vx:(Math.random()-.5)*.18, vy:(Math.random()-.5)*.12,
    phase:Math.random()*Math.PI*2,
    speed:.025+Math.random()*.04,
    col:GOLDS[Math.floor(Math.random()*GOLDS.length)],
  }));

  function loop(){
    ctx.putImageData(staticImg,0,0);
    ff.forEach(p=>{
      p.phase+=p.speed; p.x+=p.vx; p.y+=p.vy;
      if(p.x<20||p.x>W-20) p.vx*=-1;
      if(p.y<12||p.y>H-12) p.vy*=-1;
      const a=(Math.sin(p.phase)+1)/2;
      ctx.fillStyle=p.col;
      ctx.globalAlpha=a*.88;
      ctx.fillRect(Math.floor(p.x),Math.floor(p.y),1,1);
    });
    ctx.globalAlpha=1;
    requestAnimationFrame(loop);
  }
  loop();
})();

function startSite(){
  const overlay = document.getElementById('overlay');
  overlay.classList.add('fade-out');
  setTimeout(()=>{ overlay.style.display='none'; }, 1200);

  
  const a = document.getElementById('audio');
  if(a.src && a.src !== window.location.href){
    a.play().then(()=>{
      document.getElementById('play-icon').style.display  = 'none';
      document.getElementById('pause-icon').style.display = 'block';
    }).catch(()=>{});
  }
}

let nT;
function notify(msg){
  const el=document.getElementById('notif');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(nT); nT=setTimeout(()=>el.classList.remove('show'),2500);
}


const audio=document.getElementById('audio');
const fill=document.getElementById('progress-fill');
const curEl=document.getElementById('cur-time');
const totEl=document.getElementById('tot-time');
const playI=document.getElementById('play-icon');
const pauseI=document.getElementById('pause-icon');
const bar=document.getElementById('progress-bar');

function fmt(t){const m=Math.floor(t/60),s=Math.floor(t%60);return`${m<10?'0':''}${m}:${s<10?'0':''}${s}`;}
function togglePlay(){
  if(!audio.src||audio.src===window.location.href){notify('Добавь mp3 в <audio src="">');return;}
  if(audio.paused){audio.play();playI.style.display='none';pauseI.style.display='block';}
  else{audio.pause();playI.style.display='block';pauseI.style.display='none';}
}
function setVol(v){audio.volume=v/100;}
audio.addEventListener('loadedmetadata',()=>{totEl.textContent=fmt(audio.duration);});
audio.addEventListener('timeupdate',()=>{
  curEl.textContent=fmt(audio.currentTime);
  fill.style.width=(audio.currentTime/audio.duration*100)+'%';
});
audio.addEventListener('ended',()=>{
  playI.style.display='block'; pauseI.style.display='none';
  fill.style.width='0%'; curEl.textContent='00:00';
});
bar.addEventListener('click',e=>{
  if(!audio.duration) return;
  const r=bar.getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
});
</script>
